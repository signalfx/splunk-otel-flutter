include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-inference: true
    strict-raw-types: true
  # Legacy but still widely used and supported:
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false

  exclude:
    - build/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated_plugin_registrant.dart"

  errors:
    # Promote selected rules so CI fails fast.
    missing_required_param: error
    missing_return: error
    dead_code: warning
    todo: ignore

    # Make const-related rules strict (optional but matches your expectations).
    prefer_const_constructors: error
    prefer_const_literals_to_create_immutables: error

linter:
  rules:
    # Opt-in rules not enabled by flutter_lints v6.
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - use_key_in_widget_constructors

    # A few pragmatic style picks (many others are already covered by flutter_lints).
    - avoid_print
    - prefer_final_locals
    - prefer_final_fields
    - prefer_spread_collections
    - prefer_if_null_operators
    - unnecessary_string_interpolations
    - unnecessary_parenthesis