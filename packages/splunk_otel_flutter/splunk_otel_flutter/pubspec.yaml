name: splunk_otel_flutter
description: "Splunk Flutter Agent"
version: 0.0.1
#TODO add repository and homepage before release

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.3.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  splunk_otel_flutter_platform_interface: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.splunk.rum.flutter
        pluginClass: SplunkOtelFlutterPlugin
      ios:
        pluginClass: SplunkOtelFlutterPlugin
        supportsSwift: true
        deploymentTarget: "15.0"