name: splunk_otel_flutter
description: "Splunk Flutter Agent"
version: 1.0.0-dev.1
repository: https://github.com/signalfx/splunk-otel-flutter/tree/main/packages/splunk_otel_flutter/splunk_otel_flutter
homepage: https://github.com/signalfx/splunk-otel-flutter

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  splunk_otel_flutter_platform_interface: ^1.0.0-dev.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.splunk.rum.flutter
        pluginClass: SplunkOtelFlutterPlugin
      ios:
        pluginClass: SplunkOtelFlutterPlugin
        supportsSwift: true
        deploymentTarget: "15.0"