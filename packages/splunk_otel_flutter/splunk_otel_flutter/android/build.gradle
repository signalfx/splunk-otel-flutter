group = "com.splunk.rum.flutter"
version = "1.0-SNAPSHOT"

def splunkEscapeForBuildConfig(String value) {
    return '"' + value.replace("\\", "\\\\").replace("\"", "\\\"") + '"'
}

def splunkReadFlutterFrameworkVersion() {
    def props = new Properties()
    def localFile = rootProject.file("local.properties")
    if (localFile.exists()) {
        localFile.withInputStream { props.load(it) }
    }
    def sdkPath = props.getProperty("flutter.sdk")
    if (sdkPath == null) {
        return "unknown"
    }
    def versionFile = new File(sdkPath, "bin/cache/flutter.version.json")
    if (!versionFile.exists()) {
        return "unknown"
    }
    try {
        def json = new groovy.json.JsonSlurper().parse(versionFile)
        def v = json.frameworkVersion != null ? json.frameworkVersion : json.flutterVersion
        return v != null ? v.toString() : "unknown"
    } catch (Throwable ignored) {
        return "unknown"
    }
}

def splunkFlutterFrameworkVersion = splunkReadFlutterFrameworkVersion()
def rumSdkFlutterVersion = "1.0.0-alpha.1"

buildscript {
    ext.kotlin_version = "2.1.0"
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.9.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.splunk.rum.flutter"

    compileSdk = 36

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled(true)
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 24
        buildConfigField(
                "String",
                "SPLUNK_FLUTTER_FRAMEWORK_VERSION",
                splunkEscapeForBuildConfig(splunkFlutterFrameworkVersion))
        buildConfigField(
                "String",
                "RUM_SDK_FLUTTER_VERSION",
                splunkEscapeForBuildConfig(rumSdkFlutterVersion))
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}

dependencies {
    implementation("com.splunk:splunk-otel-android:2.1.4")

    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.3")

    testImplementation("org.jetbrains.kotlin:kotlin-test")
    testImplementation("org.mockito:mockito-core:5.0.0")
}
