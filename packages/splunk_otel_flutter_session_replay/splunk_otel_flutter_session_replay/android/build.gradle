group = "com.splunk.rum.flutter.sessionreplay"
version = "1.0-SNAPSHOT"

buildscript {
    ext.getExtOrDefault = {name ->
        return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['SplunkSessionReplay_' + name]
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.9.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}")
    }
}

def getExtOrIntegerDefault(name) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["SplunkSessionReplay_" + name]).toInteger()
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

def splunkSdkVersion = getExtOrDefault("splunkSdkVersion")

android {
    namespace = "com.splunk.rum.flutter.sessionreplay"

    compileSdk = getExtOrIntegerDefault("compileSdkVersion")

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled(true)
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = getExtOrIntegerDefault("minSdkVersion")
        consumerProguardFiles("consumer-rules.pro")
    }

    dependencies {
        implementation("com.splunk:rum-integration-sessionreplay:$splunkSdkVersion")
        implementation("com.splunk:rum-integration-agent-api:$splunkSdkVersion")

        coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.3")

        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.mockito:mockito-core:5.0.0")
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}
