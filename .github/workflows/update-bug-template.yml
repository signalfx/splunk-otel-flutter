name: Update Bug Template Versions

on:
  push:
    branches: [main]
    paths:
      - 'packages/splunk_otel_flutter/splunk_otel_flutter/CHANGELOG.md'
      - 'packages/splunk_otel_flutter_session_replay/splunk_otel_flutter_session_replay/CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-bug-template
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Update dropdown from CHANGELOG
        run: bash .github/scripts/update-bug-template.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(github): update bug template versions from CHANGELOG"
          title: "chore(github): update bug template versions from CHANGELOG"
          body: |
            Automated update of the `2. Agent Version` dropdown in
            `.github/ISSUE_TEMPLATE/bug.yml` based on the stable release
            headings in
            `packages/splunk_otel_flutter/splunk_otel_flutter/CHANGELOG.md`.

            Merge after verifying the options list matches what is
            published on pub.dev.

            Note: this workflow requires **Settings -> Actions -> General
            -> Workflow permissions -> "Allow GitHub Actions to create and
            approve pull requests"** to be enabled.
          branch: chore/update-bug-template-versions
          delete-branch: true
          labels: chore
          sign-commits: true
