name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enforce conventional commits on all commits in the PR.
  commitlint:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  flutter-analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter (stable)
        shell: bash
        run: |
          FLUTTER_HOME="$RUNNER_TEMP/flutter"
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$FLUTTER_HOME"
          export PATH="$PATH:$FLUTTER_HOME/bin"
          echo "$FLUTTER_HOME/bin" >> "$GITHUB_PATH" # Add Flutter bin to PATH for subsequent steps
          flutter --version
          flutter precache --universal

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Activate Melos
        run: dart pub global activate melos

        # Add Dart's global executable path to GITHUB_PATH
      - name: Add Dart global executables to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Run Melos Bootstrap
        # This command will run `flutter pub get` for all packages in your workspace,
        # correctly linking local dependencies via `pub workspaces`.
        run: melos bootstrap

      - name: Run Melos Analyze
        # This command will run `dart analyze` across all packages in your workspace.
        # The flags are passed directly to the underlying `dart analyze` command.
        run: melos analyze --no-fatal-infos --fatal-warnings