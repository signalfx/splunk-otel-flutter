name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enforce conventional commits on all commits in the PR.
  commitlint:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  flutter-analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter (stable) outside workspace
        shell: bash
        run: |
          FLUTTER_HOME="$RUNNER_TEMP/flutter"
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$FLUTTER_HOME"
          # Make flutter available in THIS step:
          export PATH="$PATH:$FLUTTER_HOME/bin"
          # And for subsequent steps:
          echo "$FLUTTER_HOME/bin" >> "$GITHUB_PATH"
          flutter --version
          flutter precache --universal

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies (root)
        shell: bash
        run: flutter pub get

      - name: Analyze (root)
        shell: bash
        run: dart analyze --no-fatal-infos --fatal-warnings

      - name: Install deps and analyze example (if present)
        shell: bash
        run: |
          if [ -f example/pubspec.yaml ]; then
            (cd example && flutter pub get)
            (cd example && dart analyze --no-fatal-infos --fatal-warnings)
          fi