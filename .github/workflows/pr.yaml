name: "Pull Request Checks"

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enforce conventional commit style via PR title (best with squash merges).
  semantic-pr-title:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            style
            test
            revert
          requireScope: false
          subjectPattern: '^[a-z0-9].*'
          subjectPatternError: 'PR title must start in lower-case and follow conventional commits (e.g., "feat(auth): add mfa").'

  # Run Dart/Flutter static analysis. Fails on warnings/errors.
  dart-analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      # Use Flutter SDK (covers both Flutter and pure Dart packages).
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # flutter-version: '3.24.x' # Optionally pin a version.

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: dart analyze