name: Flutter Analyze

on:
  pull_request:
    branches: [main, develop]

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter (stable) and verify
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          # Make flutter available in THIS step:
          export PATH="$PATH:$PWD/flutter/bin"
          # And for subsequent steps:
          echo "$PWD/flutter/bin" >> "$GITHUB_PATH"
          flutter --version
          flutter precache --universal

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies (root)
        run: flutter pub get

      - name: Analyze (root)
        run: flutter analyze --no-fatal-infos --fatal-warnings

      - name: Install deps and analyze example (if present)
        run: |
          if [ -f example/pubspec.yaml ]; then
            (cd example && flutter pub get)
            (cd example && flutter analyze --no-fatal-infos --fatal-warnings)
          fi